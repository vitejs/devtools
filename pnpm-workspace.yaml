allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  rolldown: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true
ignoreWorkspaceRootCheck: true
minimumReleaseAge: 0
shamefullyHoist: true
shellEmulator: true
strictPeerDependencies: false
trustPolicy: no-downgrade
trustPolicyExclude:
  - langium
  - tinyexec
